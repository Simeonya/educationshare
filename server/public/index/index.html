<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">

    <title>EducationShare - Welcome</title>
</head>

<body>
    <h1>Screen-Share</h1>

    <div class="darkmode-control darkmode-switch">
        <input type="checkbox" class="darkmode-control-input" id="darkSwitch">
        <label class="darkmode-control-label" for="darkSwitch"></label>
    </div>

    <div class="container" id="optionsContainer">
        <div class="options">
            <button id="start">Connect</button>
            <button id="teacher">Register as teacher</button>
        </div>
    </div>

    <div class="register" id="registerContainer">
        <form>

            <input type="text" id="firstName" placeholder="Firstname">
            <input type="text" id="lastName" placeholder="Lastname">
            <input type="text" id="email" placeholder="Email">
            <input type="text" id="password" placeholder="Password">
            <input type="text" id="password2" placeholder="Repeat password">
            <button id="register">Register</button>
            <button id="back">Cancel</button>

        </form>
    </div>

    <script src="main.js"></script>
</body>

</html>
