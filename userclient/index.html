<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">
    <title>EducationShare - User Client</title>
</head>

<body>
    <h1>Screen-Share</h1>

    <div>
        <div>
            <p>Screen preview</p>
            <video id="localVideo" width="500" autoplay controls>
                Your browser does not support the video tag.
            </video>
            <br>
            <p> Video Width </p>
            <input type="range" min="1" max="1000" value="500" id="sizeSlider">

        </div>

        <div id="call_container" style="display: flex;">

        </div>
    </div>

    <div">
        <button onclick=createOffer()>Connection request</button>
        <button onclick=createAnswer()>Connection answer</button>
        </div>

        <script src="main.js"></script>
</body>

</html>
