<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="style.css">
    <title>EducationShare - User Client</title>
</head>

<body>
    <h1>Screen-Share</h1>

    <div class="screenShare" id="screenShare">
        <p>Screen preview</p>
        <video id="localVideo" width="500" autoplay controls>
            Your browser does not support this feature
        </video>
        <br>
        <p> Video Width </p>
        <input type="range" min="1" max="1000" value="500" id="sizeSlider"><br>
        <button type="button" id="shareButton">Start Sharing</button>
    </div>

    <div class="userData" id="userData">
        <form>
            <h1>Join a Room</h1>
            <input type="text" id="roomUsername" placeholder="Name">
            <input type="text" id="roomAddress" placeholder="Server Address">
            <input type="password" id="roomPassword" placeholder="Server Password">
            <button type="button" id="joinButton">Confirm</button>
        </form>
    </div>

    <script src="main.js"></script>
</body>

</html>
